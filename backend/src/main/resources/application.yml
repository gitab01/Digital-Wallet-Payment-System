server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

spring:
  application:
    name: digital-wallet-api

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/digitalwallet}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 5
      minimum-idle: 2
      idle-timeout: 300000
      pool-name: DigitalWalletHikariPool

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    open-in-view: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: 86400000
  refresh-expiration: 604800000

# Logging
logging:
  level:
    com.digitalwallet: INFO
    org.springframework.security: WARN

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# CORS
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
