services:
  # ── Spring Boot Web Service ───────────────────────────────────────────────
  - type: web
    name: digital-wallet-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/actuator/health
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: digital-wallet-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: digital-wallet-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: digital-wallet-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://digital-wallet-frontend.vercel.app

  # ── PostgreSQL Database ───────────────────────────────────────────────────
databases:
  - name: digital-wallet-db
    plan: free
    databaseName: digitalwallet
    user: dwallet
